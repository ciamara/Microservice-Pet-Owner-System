services:
  discovery-service:
    build: ./discovery-server
    ports:
      - "8761:8761"
    networks:
      - aui-network

  config-service:
    build: ./config-server
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
    volumes:
      - ./config-repo:/config
    networks:
      - aui-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/owners-service/default"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Databases ---
  db-owners:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: owners_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    networks:
      - aui-network

  db-pets:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pets_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    networks:
      - aui-network

  # --- Microservices ---
  owners-service:
    build: ./owners
    environment:
      - SPRING_APPLICATION_NAME=owners-service
      - SPRING_CLOUD_CONFIG_FAIL_FAST=true
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_DISCOVERY_INSTANCE_ID=owners-1
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_started
      db-owners:
        condition: service_started
    networks:
      - aui-network

  pets-service-1:
    build: ./pets
    environment:
      - SPRING_APPLICATION_NAME=pets-service
      - SPRING_CLOUD_CONFIG_FAIL_FAST=true
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_DISCOVERY_INSTANCE_ID=pets-1
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_started
      db-pets:
        condition: service_started
    networks:
      - aui-network

  pets-service-2:
    build: ./pets
    environment:
      - SPRING_APPLICATION_NAME=pets-service
      - SPRING_CLOUD_CONFIG_FAIL_FAST=true
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_DISCOVERY_INSTANCE_ID=pets-2
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_started
      db-pets:
        condition: service_started
    networks:
      - aui-network

  gateway-service:
    build: ./GatewayApplication
    ports:
      - "8080:8080"
    environment:
    - SPRING_APPLICATION_NAME=gateway-service
    - SPRING_CONFIG_IMPORT=configserver:http://config-service:8888
    - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    - EUREKA_CLIENT_FETCH_REGISTRY=true
    - EUREKA_CLIENT_REGISTER_WITH_EUREKA=true
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - aui-network

  # --- Frontend ---
  frontend:
    build: ./angular-frontend
    ports:
      - "4200:80"
    environment:
      - GATEWAY_URL=http://gateway-service:8080/
    depends_on:
      - gateway-service
    networks:
      - aui-network

networks:
  aui-network:
    driver: bridge